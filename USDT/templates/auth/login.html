<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--sky:#0ea5e9;--sky2:#0284c7;--bg:#f0f7ff;--surface:#fff;--surface2:#f8fafc;--border:#c8e0f4;--text:#0f172a;--muted:#64748b;--red:#dc2626;--red-dim:rgba(220,38,38,.1);--radius:14px}
[data-theme="dark"]{--bg:#0c1220;--surface:#131c2e;--surface2:#1a2540;--border:#1e3050;--text:#e2e8f0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;transition:background .3s}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:40px;width:100%;max-width:420px;box-shadow:0 4px 40px rgba(14,165,233,.08)}
.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:32px}
.logo-mark{width:40px;height:40px;background:linear-gradient(135deg,var(--sky),var(--sky2));border-radius:10px;display:flex;align-items:center;justify-content:center}
.logo-name{font-size:20px;font-weight:700}
.logo-name span{color:var(--sky)}
.auth-title{font-size:22px;font-weight:700;margin-bottom:6px}
.auth-sub{font-size:13.5px;color:var(--muted);margin-bottom:28px}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.form-group label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
.form-group input{padding:11px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:9px;font-size:14px;color:var(--text);outline:none;transition:border-color .2s;font-family:inherit}
.form-group input:focus{border-color:var(--sky)}
.btn-full{width:100%;padding:13px;background:var(--sky);color:#fff;border:none;border-radius:9px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;transition:opacity .15s}
.btn-full:hover{opacity:.9}
.msg{padding:11px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;border-left:3px solid var(--red);background:var(--red-dim);color:var(--red)}
.auth-footer{text-align:center;margin-top:20px;font-size:13px;color:var(--muted)}
.auth-footer a{color:var(--sky);text-decoration:none;font-weight:600}
.theme-btn{position:fixed;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:var(--surface);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted)}
[data-theme="light"] .icon-moon{display:none}
[data-theme="dark"] .icon-sun{display:none}
</style>
</head>
<body>
<button class="theme-btn" id="themeToggle">
  <svg class="icon-sun" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  <svg class="icon-moon" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
</button>
<div class="auth-card">
  <div class="auth-logo">
    <div class="logo-mark"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
    <span class="logo-name">My<span>Portal</span></span>
  </div>
  <div class="auth-title">Welcome back</div>
  <div class="auth-sub">Sign in to your account to continue</div>
  {% if messages %}{% for m in messages %}<div class="msg">{{ m }}</div>{% endfor %}{% endif %}
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" placeholder="Enter your username" autofocus required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter your password" required>
    </div>
    <button type="submit" class="btn-full">Sign In</button>
  </form>
  <div class="auth-footer">
    Admin? <a href="{% url 'admin-pin-login' %}">Use PIN login →</a>
  </div>
</div>
<script>
const html=document.documentElement;
html.setAttribute('data-theme',localStorage.getItem('theme')||'light');
document.getElementById('themeToggle').addEventListener('click',()=>{
  const n=html.getAttribute('data-theme')==='light'?'dark':'light';
  html.setAttribute('data-theme',n);localStorage.setItem('theme',n);
});
</script>
</body>
</html>
