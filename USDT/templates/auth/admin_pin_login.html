<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin PIN Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--sky:#0ea5e9;--sky2:#0284c7;--bg:#f0f7ff;--surface:#fff;--surface2:#f8fafc;--border:#c8e0f4;--text:#0f172a;--muted:#64748b;--red:#dc2626;--red-dim:rgba(220,38,38,.1);--amber:#d97706;--amber-dim:rgba(217,119,6,.1);--radius:14px}
[data-theme="dark"]{--bg:#0c1220;--surface:#131c2e;--surface2:#1a2540;--border:#1e3050;--text:#e2e8f0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:40px;width:100%;max-width:400px;box-shadow:0 4px 40px rgba(14,165,233,.08)}
.shield{width:56px;height:56px;background:linear-gradient(135deg,var(--sky),var(--sky2));border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:20px}
.auth-title{font-size:22px;font-weight:700;margin-bottom:6px}
.auth-sub{font-size:13.5px;color:var(--muted);margin-bottom:28px}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.form-group label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
.form-group input{padding:11px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:9px;font-size:14px;color:var(--text);outline:none;transition:border-color .2s;font-family:inherit}
.form-group input:focus{border-color:var(--sky)}
/* PIN dots display */
.pin-display{display:flex;gap:12px;justify-content:center;margin:20px 0}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);transition:all .2s}
.pin-dot.filled{background:var(--sky);border-color:var(--sky)}
/* PIN pad */
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.pin-key{padding:16px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;font-size:18px;font-weight:600;cursor:pointer;transition:background .15s,transform .1s;text-align:center;user-select:none}
.pin-key:hover{background:var(--sky-dim,rgba(14,165,233,.12));border-color:var(--sky)}
.pin-key:active{transform:scale(.95)}
.pin-key.del{font-size:14px;color:var(--red)}
.btn-full{width:100%;padding:13px;background:var(--sky);color:#fff;border:none;border-radius:9px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn-full:hover{opacity:.9}
.btn-full:disabled{opacity:.5;cursor:not-allowed}
.msg{padding:11px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;border-left:3px solid var(--red);background:var(--red-dim);color:var(--red)}
.back-link{display:block;text-align:center;margin-top:16px;font-size:13px;color:var(--muted);text-decoration:none}
.back-link:hover{color:var(--sky)}
.hidden-input{position:absolute;opacity:0;pointer-events:none}
</style>
</head>
<body>
<div class="auth-card">
  <div class="shield"><svg width="26" height="26" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
  <div class="auth-title">Admin Access</div>
  <div class="auth-sub">Enter your username and 4-digit PIN</div>

  {% if messages %}{% for m in messages %}<div class="msg">{{ m }}</div>{% endfor %}{% endif %}

  <form method="post" id="pinForm">
    {% csrf_token %}
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" placeholder="Admin username" required autofocus>
    </div>

    <div class="pin-display" id="pinDisplay">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>

    <input type="hidden" name="pin" id="pinValue">

    <div class="pin-pad">
      {% for n in "123456789" %}<div class="pin-key" onclick="addPin('{{ n }}')">{{ n }}</div>{% endfor %}
      <div class="pin-key del" onclick="clearPin()">CLR</div>
      <div class="pin-key" onclick="addPin('0')">0</div>
      <div class="pin-key del" onclick="delPin()">⌫</div>
    </div>

    <button type="submit" class="btn-full" id="submitBtn" disabled>Unlock</button>
  </form>

  <a href="{% url 'login' %}" class="back-link">← Back to user login</a>
</div>

<script>
let pin = '';
function updateDisplay(){
  for(let i=0;i<4;i++) document.getElementById('d'+i).classList.toggle('filled',i<pin.length);
  document.getElementById('pinValue').value = pin;
  document.getElementById('submitBtn').disabled = pin.length !== 4;
}
function addPin(d){ if(pin.length<4){pin+=d;updateDisplay()} }
function delPin(){ pin=pin.slice(0,-1);updateDisplay() }
function clearPin(){ pin='';updateDisplay() }
</script>
</body>
</html>
