<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Santander Bank - Secure Digital Banking</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
,::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#16a34a;--green-light:#22c55e;--green-dark:#15803d;
  --black:#0a0a0a;--black-soft:#111111;--black-card:#1a1a1a;
  --white:#ffffff;--gray:#9ca3af;--gray-dark:#4b5563;
  --glass:rgba(255,255,255,0.05);--glass-border:rgba(255,255,255,0.1);
  --glow:0 0 40px rgba(22,163,74,0.3);--glow-soft:0 0 20px rgba(22,163,74,0.15);
}
html{scroll-behavior:smooth}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--black);color:var(--white);overflow-x:hidden;line-height:1.6}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--black-soft)}
::-webkit-scrollbar-thumb{background:var(--green);border-radius:3px}

@keyframes fadeInUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-60px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(60px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 20px rgba(22,163,74,0.3)}50%{box-shadow:0 0 40px rgba(22,163,74,0.6)}}
@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

.animate-fade-up{opacity:0;animation:fadeInUp 0.8s ease forwards}
.animate-fade{opacity:0;animation:fadeIn 1s ease forwards}
.animate-slide-left{opacity:0;animation:slideInLeft 0.8s ease forwards}
.animate-slide-right{opacity:0;animation:slideInRight 0.8s ease forwards}
.delay-1{animation-delay:0.1s}
.delay-2{animation-delay:0.2s}
.delay-3{animation-delay:0.3s}
.delay-4{animation-delay:0.4s}

.navbar{position:fixed;top:0;left:0;right:0;z-index:1000;padding:16px 40px;display:flex;align-items:center;justify-content:space-between;transition:all 0.4s ease;background:transparent}
.navbar.scrolled{background:rgba(10,10,10,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--glass-border);padding:12px 40px}
.nav-left{display:flex;align-items:center;gap:12px}
.nav-logo{width:40px;height:40px;display:flex;align-items:center;justify-content:center}
.nav-logo svg{width:100%;height:100%}
.nav-brand{font-size:20px;font-weight:800;letter-spacing:-0.5px}
.nav-brand span{color:var(--green-light)}
.nav-links{display:flex;align-items:center;gap:32px;list-style:none}
.nav-links a{color:var(--gray);text-decoration:none;font-size:14px;font-weight:500;transition:color 0.3s;position:relative}
.nav-links a:hover{color:var(--white)}
.nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:2px;background:var(--green);transition:width 0.3s}
.nav-links a:hover::after{width:100%}
.nav-right{display:flex;align-items:center;gap:16px}

.lang-selector{position:relative}
.lang-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;background:var(--glass);border:1px solid var(--glass-border);color:var(--white);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.3s}
.lang-btn:hover{background:rgba(22,163,74,0.1);border-color:var(--green)}
.lang-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:var(--black-card);border:1px solid var(--glass-border);border-radius:12px;padding:8px;min-width:160px;opacity:0;visibility:hidden;transform:translateY(-10px);transition:all 0.3s;z-index:100}
.lang-dropdown.active{opacity:1;visibility:visible;transform:translateY(0)}
.lang-option{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:all 0.2s;font-size:13px;color:var(--gray)}
.lang-option:hover{background:var(--green-dark);color:var(--white)}

.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border-radius:10px;font-size:14px;font-weight:600;text-decoration:none;border:none;cursor:pointer;transition:all 0.3s;position:relative;overflow:hidden}
.btn-primary{background:var(--green);color:var(--white);box-shadow:var(--glow-soft)}
.btn-primary:hover{background:var(--green-light);transform:translateY(-2px);box-shadow:var(--glow)}
.btn-outline{background:transparent;color:var(--white);border:1px solid var(--glass-border)}
.btn-outline:hover{border-color:var(--green);background:rgba(22,163,74,0.1)}
.btn-glow{animation:glowPulse 2s ease infinite}
.btn-login{padding:10px 24px;background:var(--green);color:var(--white);border-radius:10px;font-size:14px;font-weight:600;text-decoration:none;transition:all 0.3s;display:inline-flex;align-items:center;gap:8px}
.btn-login:hover{background:var(--green-light);transform:translateY(-2px);box-shadow:var(--glow)}

.hero{min-height:100vh;display:flex;align-items:center;position:relative;overflow:hidden;padding:120px 40px 80px}
.hero-bg{position:absolute;inset:0;z-index:0}
.hero-bg::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(22,163,74,0.15) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(22,163,74,0.08) 0%,transparent 50%);z-index:1}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(22,163,74,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(22,163,74,0.03) 1px,transparent 1px);background-size:60px 60px;z-index:0}
.hero-content{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;position:relative;z-index:2;width:100%}
.hero-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:50px;background:var(--glass);border:1px solid var(--glass-border);font-size:13px;color:var(--green-light);margin-bottom:24px;backdrop-filter:blur(10px)}
.hero-badge .dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s ease infinite}
.hero-title{font-size:64px;font-weight:900;line-height:1.1;letter-spacing:-2px;margin-bottom:24px;background:linear-gradient(135deg,var(--white) 0%,var(--gray) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-title span{color:var(--green-light);-webkit-text-fill-color:var(--green-light)}
.hero-desc{font-size:18px;color:var(--gray);max-width:520px;margin-bottom:40px;line-height:1.7}
.hero-btns{display:flex;gap:16px;flex-wrap:wrap}
.hero-stats{display:flex;gap:48px;margin-top:60px;padding-top:40px;border-top:1px solid var(--glass-border)}
.stat-item{text-align:center}
.stat-num{font-size:36px;font-weight:800;color:var(--green-light);display:block}
.stat-label{font-size:13px;color:var(--gray);margin-top:4px}

.hero-visual{position:relative;display:flex;justify-content:center;align-items:center}
.phone-mockup{width:280px;height:560px;background:var(--black-card);border-radius:40px;border:2px solid var(--glass-border);padding:12px;position:relative;animation:float 6s ease-in-out infinite;box-shadow:0 40px 80px rgba(0,0,0,0.6),0 0 60px rgba(22,163,74,0.1)}
.phone-screen{width:100%;height:100%;background:linear-gradient(180deg,#1a1a1a 0%,#0a0a0a 100%);border-radius:32px;overflow:hidden;position:relative;display:flex;flex-direction:column}
.phone-notch{width:120px;height:24px;background:var(--black);border-radius:0 0 16px 16px;position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:10}
.phone-header{padding:40px 20px 20px;text-align:center}
.phone-balance{font-size:32px;font-weight:800;color:var(--white)}
.phone-balance-label{font-size:12px;color:var(--gray);margin-top:4px}
.phone-card{width:85%;margin:0 auto;height:140px;background:linear-gradient(135deg,var(--green-dark),var(--green));border-radius:16px;padding:16px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
.phone-card::before{content:'';position:absolute;top:-50%;right:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(255,255,255,0.1) 0%,transparent 70%);animation:rotate 20s linear infinite}
.phone-card-num{font-size:14px;font-weight:600;letter-spacing:2px;color:rgba(255,255,255,0.9);font-family:monospace}
.phone-card-name{font-size:12px;color:rgba(255,255,255,0.7)}
.phone-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:20px}
.phone-action{display:flex;flex-direction:column;align-items:center;gap:8px;padding:12px;border-radius:12px;background:var(--glass);border:1px solid var(--glass-border);transition:all 0.3s}
.phone-action:hover{background:rgba(22,163,74,0.1);border-color:var(--green)}
.phone-action-icon{width:40px;height:40px;border-radius:12px;background:var(--green-dark);display:flex;align-items:center;justify-content:center;color:var(--white);font-size:18px}
.phone-action-label{font-size:11px;color:var(--gray)}
.phone-transactions{padding:0 20px;flex:1;overflow:hidden}
.phone-tx-title{font-size:12px;font-weight:600;color:var(--gray);margin-bottom:12px}
.phone-tx-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--glass-border)}
.phone-tx-icon{width:36px;height:36px;border-radius:10px;background:var(--green-dark);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--white)}
.phone-tx-info{flex:1}
.phone-tx-name{font-size:13px;font-weight:600;color:var(--white)}
.phone-tx-date{font-size:11px;color:var(--gray)}
.phone-tx-amount{font-size:13px;font-weight:700;color:var(--green-light)}
.glow-orb{position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(22,163,74,0.2) 0%,transparent 70%);filter:blur(40px);animation:float 8s ease-in-out infinite}
.glow-orb-1{top:10%;right:10%;animation-delay:0s}
.glow-orb-2{bottom:20%;left:5%;width:200px;height:200px;background:radial-gradient(circle,rgba(22,163,74,0.1) 0%,transparent 70%);animation-delay:-4s}

.features{padding:120px 40px;background:var(--black-soft);position:relative}
.features::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--green),transparent)}
.section-header{text-align:center;max-width:600px;margin:0 auto 80px}
.section-label{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:50px;background:var(--glass);border:1px solid var(--glass-border);font-size:12px;color:var(--green-light);margin-bottom:20px;text-transform:uppercase;letter-spacing:1px;font-weight:600}
.section-title{font-size:42px;font-weight:800;letter-spacing:-1px;margin-bottom:16px}
.section-desc{font-size:17px;color:var(--gray);line-height:1.7}
.features-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;max-width:1280px;margin:0 auto}
.feature-card{padding:40px 32px;border-radius:20px;background:var(--black-card);border:1px solid var(--glass-border);transition:all 0.4s ease;position:relative;overflow:hidden}
.feature-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--green),var(--green-light));transform:scaleX(0);transition:transform 0.4s ease}
.feature-card:hover{transform:translateY(-8px);border-color:var(--green);box-shadow:0 20px 40px rgba(0,0,0,0.4),var(--glow-soft)}
.feature-card:hover::before{transform:scaleX(1)}
.feature-icon{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--green-dark),var(--green));display:flex;align-items:center;justify-content:center;margin-bottom:24px;font-size:24px;color:var(--white);box-shadow:var(--glow-soft)}
.feature-title{font-size:20px;font-weight:700;margin-bottom:12px}
.feature-desc{font-size:14px;color:var(--gray);line-height:1.7}

.security{padding:120px 40px;position:relative;overflow:hidden}
.security-content{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
.security-visual{position:relative}
.security-card{width:100%;max-width:480px;background:var(--black-card);border:1px solid var(--glass-border);border-radius:24px;padding:40px;position:relative;overflow:hidden}
.security-card::after{content:'';position:absolute;inset:0;border-radius:24px;padding:1px;background:linear-gradient(135deg,var(--green),transparent,transparent);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
.security-shield{width:80px;height:80px;border-radius:24px;background:linear-gradient(135deg,var(--green),var(--green-light));display:flex;align-items:center;justify-content:center;margin-bottom:24px;font-size:36px;color:var(--white);box-shadow:var(--glow)}
.security-list{list-style:none;display:flex;flex-direction:column;gap:16px}
.security-list li{display:flex;align-items:center;gap:14px;font-size:15px;color:var(--gray)}
.security-check{width:24px;height:24px;border-radius:50%;background:var(--green-dark);display:flex;align-items:center;justify-content:center;color:var(--white);font-size:12px}

.testimonials{padding:120px 40px;background:var(--black-soft);position:relative}
.testimonials-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;max-width:1280px;margin:0 auto}
.testimonial-card{padding:32px;border-radius:20px;background:var(--black-card);border:1px solid var(--glass-border);transition:all 0.4s}
.testimonial-card:hover{border-color:var(--green);transform:translateY(-4px)}
.testimonial-stars{display:flex;gap:4px;margin-bottom:16px;color:var(--green-light);font-size:16px}
.testimonial-text{font-size:15px;color:var(--gray);line-height:1.8;margin-bottom:24px;font-style:italic}
.testimonial-author{display:flex;align-items:center;gap:14px}
.testimonial-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--green-dark),var(--green));display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--white)}
.testimonial-name{font-size:15px;font-weight:600;color:var(--white)}
.testimonial-role{font-size:13px;color:var(--gray)}

.cta{padding:100px 40px;position:relative;overflow:hidden}
.cta-inner{max-width:900px;margin:0 auto;text-align:center;padding:80px 40px;border-radius:32px;background:linear-gradient(135deg,var(--green-dark),var(--green));position:relative;overflow:hidden}
.cta-inner::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");opacity:0.5}
.cta-title{font-size:42px;font-weight:800;color:var(--white);margin-bottom:16px;position:relative;z-index:1}
.cta-desc{font-size:18px;color:rgba(255,255,255,0.8);margin-bottom:40px;position:relative;z-index:1;max-width:500px;margin-left:auto;margin-right:auto}
.cta-btns{display:flex;gap:16px;justify-content:center;position:relative;z-index:1;flex-wrap:wrap}
.cta-btn-white{background:var(--white);color:var(--black);padding:14px 32px;border-radius:12px;font-size:15px;font-weight:700;text-decoration:none;transition:all 0.3s;display:inline-flex;align-items:center;gap:8px}
.cta-btn-white:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(0,0,0,0.3)}
.cta-btn-outline{background:transparent;color:var(--white);border:2px solid rgba(255,255,255,0.3);padding:14px 32px;border-radius:12px;font-size:15px;font-weight:700;text-decoration:none;transition:all 0.3s;display:inline-flex;align-items:center;gap:8px}
.cta-btn-outline:hover{background:rgba(255,255,255,0.1);border-color:var(--white)}

.footer{padding:60px 40px 30px;background:var(--black);border-top:1px solid var(--glass-border)}
.footer-content{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:60px}
.footer-brand{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.footer-brand .nav-logo{width:36px;height:36px}
.footer-brand-text{font-size:18px;font-weight:800}
.footer-brand-text span{color:var(--green-light)}
.footer-desc{font-size:14px;color:var(--gray);line-height:1.7;max-width:300px}
.footer-title{font-size:14px;font-weight:700;color:var(--white);margin-bottom:20px;text-transform:uppercase;letter-spacing:1px}
.footer-links{list-style:none;display:flex;flex-direction:column;gap:12px}
.footer-links a{color:var(--gray);text-decoration:none;font-size:14px;transition:color 0.3s}
.footer-links a:hover{color:var(--green-light)}
.footer-bottom{margin-top:50px;padding-top:30px;border-top:1px solid var(--glass-border);display:flex;justify-content:space-between;align-items:center;max-width:1280px;margin-left:auto;margin-right:auto}
.footer-copy{font-size:13px;color:var(--gray-dark)}
.footer-socials{display:flex;gap:16px}
.footer-socials a{width:40px;height:40px;border-radius:10px;background:var(--glass);border:1px solid var(--glass-border);display:flex;align-items:center;justify-content:center;color:var(--gray);transition:all 0.3s;text-decoration:none}
.footer-socials a:hover{background:var(--green-dark);color:var(--white);border-color:var(--green)}

.mobile-menu-btn{display:none;width:40px;height:40px;border-radius:10px;background:var(--glass);border:1px solid var(--glass-border);align-items:center;justify-content:center;color:var(--white);cursor:pointer}
.mobile-menu{position:fixed;inset:0;background:var(--black);z-index:999;display:flex;flex-direction:column;padding:80px 40px 40px;transform:translateX(100%);transition:transform 0.4s ease}
.mobile-menu.active{transform:translateX(0)}
.mobile-menu-close{position:absolute;top:20px;right:20px;width:40px;height:40px;border-radius:10px;background:var(--glass);border:1px solid var(--glass-border);display:flex;align-items:center;justify-content:center;color:var(--white);cursor:pointer;font-size:20px}
.mobile-menu-links{list-style:none;display:flex;flex-direction:column;gap:24px}
.mobile-menu-links a{color:var(--white);text-decoration:none;font-size:24px;font-weight:700}
.mobile-menu-links a:hover{color:var(--green-light)}
.mobile-menu-footer{margin-top:auto}

@media(max-width:1024px){
  .hero-content{grid-template-columns:1fr;gap:60px;text-align:center}
  .hero-title{font-size:48px}
  .hero-desc{margin:0 auto 40px}
  .hero-btns{justify-content:center}
  .hero-stats{justify-content:center}
  .features-grid{grid-template-columns:repeat(2,1fr)}
  .security-content{grid-template-columns:1fr;gap:60px}
  .testimonials-grid{grid-template-columns:repeat(2,1fr)}
  .footer-content{grid-template-columns:1fr 1fr;gap:40px}
}
@media(max-width:768px){
  .navbar{padding:12px 20px}
  .nav-links,.nav-right .btn-login{display:none}
  .mobile-menu-btn{display:flex}
  .hero{padding:100px 20px 60px}
  .hero-title{font-size:36px}
  .hero-desc{font-size:16px}
  .hero-stats{flex-direction:column;gap:24px}
  .features{padding:80px 20px}
  .features-grid{grid-template-columns:1fr}
  .section-title{font-size:32px}
  .testimonials{padding:80px 20px}
  .testimonials-grid{grid-template-columns:1fr}
  .cta{padding:60px 20px}
  .cta-title{font-size:28px}
  .footer-content{grid-template-columns:1fr;gap:40px}
  .footer-bottom{flex-direction:column;gap:20px;text-align:center}
}

.reveal{opacity:0;transform:translateY(40px);transition:all 0.8s ease}
.reveal.active{opacity:1;transform:translateY(0)}

<section class="testimonials" id="testimonials">

let currentLang = 'en';

function setLanguage(lang) {
  currentLang = lang;
  const t = translations[lang];
  if (!t) return;
  
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[key] !== undefined) {
      el.textContent = t[key];
    }
  });
  
  const langLabels = { en: 'EN', es: 'ES', fr: 'FR', de: 'DE', pt: 'PT', zh: 'ZH' };
  document.getElementById('currentLang').textContent = langLabels[lang] || 'EN';
  document.getElementById('langDropdown').classList.remove('active');
}

function toggleLang() {
  document.getElementById('langDropdown').classList.toggle('active');
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.lang-selector')) {
    document.getElementById('langDropdown').classList.remove('active');
  }
});

function toggleMobileMenu() {
  document.getElementById('mobileMenu').classList.toggle('active');
}

window.addEventListener('scroll', function() {
  const navbar = document.getElementById('navbar');
  if (window.scrollY > 50) {
    navbar.classList.add('scrolled');
  } else {
    navbar.classList.remove('scrolled');
  }
});

const revealObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('active');
    }
  });
}, { threshold: 0.1 });

document.querySelectorAll('.reveal').forEach(el => {
  revealObserver.observe(el);
});
</script>
